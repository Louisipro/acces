<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing Skill — louisdeploys</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --accent: #c8ff00;
      --accent-dim: rgba(200, 255, 0, 0.08);
      --text-muted: #444;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      gap: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-dim);
      border: 1px solid rgba(200, 255, 0, 0.2);
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    a.btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: #000;
      text-decoration: none;
      border-radius: 8px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 600;
      transition: transform 0.15s, background 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 0 0 rgba(200,255,0,0);
    }

    a.btn:hover {
      background: #d4ff1a;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(200,255,0,0.2);
    }

    .sub {
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="badge">
    <span class="badge-dot"></span>
    louisdeploys · Ressource vidéo
  </div>

  <a class="btn" href="https://github.com/coreyhaines31/marketingskills" target="_blank">
    Accéder au skill
  </a>

  <span class="sub">Redirection vers GitHub</span>

</body>
</html>
